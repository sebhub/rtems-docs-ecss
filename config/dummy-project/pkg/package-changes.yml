    .. [2] Consider these Findings' IDs preceded by "RTEMS-SMP-".

    Moreover a new set of ISVV related documents were added, namely verification
    and validation plans and reports and the overall list of ISVV findings.

    In a nutshell, the previous |QDP| release 4 (which was already an outcome of
    the RTEMS qualification efforts) has been used as the baseline for the
    improvements identified during the ISVV activities. Although these QDPs have
    been based on the RTEMS 6, other meanwhile changes (not related to ISVV
    outcomes) on the RTMES public mainline have not been integrated into the QDP
    not to compromise/jeopardise the QDP qualification that has been performed
    using this baseline.

    It must be noticed that not all of the identified and confirmed ISVV Findings
    have been corrected. Please refer to :ref:`Problems` for the list of known
    problems not addressed.

    For further details one can also refer to the RTEMS SMP ISVV Verification
    Report :cite:`ISVVVER` within the QDP.

