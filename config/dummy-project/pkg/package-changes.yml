- description: |
    The sixth version of the QDP contains the final release issued for project
    *RTEMS SMP SINGLE-CORE* with ESA Contract No.  4000140680/23/NL/AS.  The
    following changes were implemented:

    * The RTEMS baseline changed.  In package version 5, we had about 55
      QDP-specific patches on top of the RTEMS baseline.  Now, there are only
      24 patches left.  These patches fall into two categories

      * static memory benchmarks and formal methods tests, and

      * changes in the build system to support building the pre-qualified only
        feature set.

      In particular, all BSP-specific patches were reviewed by Frontgrade
      Gaisler and integrated in the RTEMS baseline.  The current RTEMS baseline
      is expected to be close to the RTEMS 6.1 release version.
      See *Annex B* of the SVR for a comparison of the RTEMS sources of this
      package version to the previous package version for the files
      contributing to the pre-qualified feature set of RTEMS.

    * Applications using only the pre-qualified feature set of RTEMS, should
      configure the task storage area of ${/glossary/idletask:/plural} using
      the new application configuration option
      ``CONFIGURE_IDLE_TASK_STORAGE_SIZE``.

    * For the ${/glossary/gr712rc:/term}, the clock driver and CPU counter
      support use now the time tag register of the Debug Support Unit (DSU).
      In general, using the DSU is not recommended for the clock driver and CPU
      counter implementation.  However, for the GR712RC, the DSU cannot be
      disabled and is always available in flight models.  The time tag register
      is implemented in radiation hardened flip-flops.  The version 2.16 of the
      `GR712RC User Manual <https://www.gaisler.com/doc/gr712rc-usermanual-2_16.pdf>`__
      contains some updates with respect to the DSU usage.

    * The specification was updated to fully cover the uniprocessor
      configuration of RTEMS for the pre-qualified feature set.  With the new
      validation tests, the 100% branch and code coverage goal is met also for
      the uniprocessor configuration.

    * QDPs for several other targets were built by embedded brains.  They are
      available on request.  This work exposed some shortcomings in the
      functional specification of RTEMS which were fixed for this package
      version.  See *Annex C* of the SVR for a detailed list of specification
      changes.

    * In the SVR section *4.6.1.1 Software Validation Specifications to TS*,
      the rules to determine if a requirement or interface is *validated* were
      clarified.  The specification and the qualification toolchain was
      restructured, to use this simple rule set.  The table in this section was
      modified to show for each requirement or interface, the validation
      status, the associated refinements or validations, and the role of the
      refinement or validation.

    * As a preparation to pre-qualify ${/glossary/posix:/term} interfaces,
      Newlib was modified to use thread-local storage objects for its internal
      data structures instead of one giant thread-specific object.

    * GCC was updated to version 13.2.  This update includes a fix for the
      critical bug `PR 107248
      <https://gcc.gnu.org/bugzilla/show_bug.cgi?id=107248>`__ which is not
      fixed in previous package versions.  This GCC release includes a
      significantly improved support to get `profiling and test coverage in
      freestanding environments
      <https://gcc.gnu.org/onlinedocs/gcc/Freestanding-Environments.html>`__.
      This new GCC feature was specifically added for this activity.  The
      qualification toolchain was updated to use it.

    * GCC was configured with Ada language support.

    * Binutils was updated to version 2.41 as a maintenance activity.

    * GDB was updated to version 13.2 as a maintenance activity.

    * Doxgyen 1.9.7 was used to build the QDP.  To improve the traceability
      between the specification and the software design several Doxygen
      improvements were implemented:
      `#9926 <https://github.com/doxygen/doxygen/pull/9926>`__,
      `#9948 <https://github.com/doxygen/doxygen/pull/9948>`__,
      `#9952 <https://github.com/doxygen/doxygen/pull/9952>`__, and
      `#9965 <https://github.com/doxygen/doxygen/pull/9965>`__.
      The improvements are included in this release.

    * The QDP host environment changed from Debian to Ubuntu 22.04 LTS.

    * The RTEMS Software Engineering manual contains now a *Formal
      Verification* chapter :cite:`RTEMS:Engineering`.
  name: Package Version 6
  package-status: package-status/esa-6
- description: |
    This is a maintenance release issued for project *RTEMS SMP Updates into
    the Qualification DP* with ESA Contract No. 4000150715/25/NL/VR.

    The main goals of this maintenance release were

    1. fixing important RTEMS bugs and shortcomings found since package release
       6, and

    2. improving the maintainability of the package, so that it is easier to
       publish following maintenance releases.

    Since upstream maintenance of GCC 13 will end in 2026, changes which make
    it easier to upgrade to a newer GCC versions were identified and
    integrated.  This was verified by compiling the RTEMS sources with GCC 16.
    The update was done with these two requirements in mind

    - The Application Programming Interface (${/glossary/api:/term}) shall
      remain backward compatible.  Users of package version 6 shall not have to
      change their existing source code due to an update to package version
      6.2.

    - The Application Binary Interface (${/glossary/abi:/term}) shall remain
      backward compatible.  Users of package version 6 shall not have to
      rebuild their software components to link executables using the RTEMS
      deployments of package version 6.2.

    The RTEMS source code changes from package version 6 to 6.2 with respect to
    the pre-qualified feature set of RTEMS can be reviewed in *Annex B* of the
    ${/glossary/svr:/plural} ${/pkg/component:/cite-group:svr}.

    The RTEMS specification was updated to facilitate bug fixes, improvements,
    and align with the RTEMS Project evolution.  The specification changes from
    package version 6 to 6.2 can be reviewed in *Annex C* of the SVRs.  To
    improve the maintainability, the specification items of RTEMS moved from a
    separate repository to the RTEMS sources in
    ${/pkg/source/rtems:/directory}.  This is used to generate change logs for
    the specification modifications from one package version to another for the
    ${/glossary/icd:/plural} ${/pkg/component:/cite-group:icd},
    ${/glossary/srs:/plural} ${/pkg/component:/cite-group:srs}, and
    ${/glossary/svs:/plural} ${/pkg/component:/cite-group:svs}.  There are a
    lot of changes between package version 5 and 6, since the specification
    tree verification and presentation was significantly improved by the
    corresponding ESA project.

    With respect to the generated documents, the update is more progressive.
    The tools to build the package were completely replaced.  The tools are
    provided by the `specware <https://pypi.org/project/specware/>`__ and
    `specmake <https://pypi.org/project/specmake/>`__ Python package.  A copy
    of the tools is included in the package and can be used to create a User
    Test Report.  The new tools can build RTEMS for multiple targets and
    configurations.  This package includes the uniprocessor and the SMP
    configuration of the ${/glossary/bsp:/term}.  In package version 6 and
    earlier, these were two separate packages.

