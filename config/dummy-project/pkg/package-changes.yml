- description: |
    The fourth version of the QDP contains a warranty release issued for
    project *Qualification of RTEMS Symmetric Multiprocessing (SMP)* ESA
    Contract No.  4000125572/18/NL/GLC/as.  There are the following changes
    compared to package version 3:

    * The RTEMS baseline changed.  In package version 3, we had about 120
      QDP-specific patches on top of the RTEMS baseline.  Now, there are only
      46 patches left.  These patches fall roughly into three categories

      * BSP-specific changes,

      * changes in the build system to support building the pre-qualified only
        feature set,

      * performance and formal methods tests.

    * Most of the validation tests are now included in the RTEMS baseline.
      Test runs on ARM and PowerPC platforms were performed showing good
      results comparable to the current QDP platforms.

    * The relicensing to BSD-2-Clause of the RTEMS sources by the RTEMS Project
      progressed significantly compared to package version 3.

    * The previous RTEMS baseline contained a bug which could result in a
      non-monotonic ``CLOCK_MONOTONIC``.  This bug is fixed in this package
      version.  See also RTEMS ticket `#4617
      <https://devel.rtems.org/ticket/4617>`_.

    * The specification and validation of some application configuration
      options was improved.  Now only test cases and validations by inspections
      are used as validation methods for application configuration options.
      Entire test suites are no longer used as a validation evidence for a
      particular requirement.

    * Significant changes in the |SRS| :cite:`QDPSRS` and |SVR|
      :cite:`QDP:SVR`, see the change log of the documents.
  name: Package Version 4
  package-status: package-status/esa-4
