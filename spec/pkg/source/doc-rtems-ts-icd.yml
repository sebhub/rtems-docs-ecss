copyrights-by-license: {}
destination-directory: ${.:/component/deployment-directory}/src/doc/rtems/ts/icd
enabled-by: pkg.feature.qual
file-mappings:
- pattern: ^common/
  replacement: ''
- pattern: ^ts/icd/constraints.rst
  replacement: include/constraints.rst
- pattern: ^ts/icd/
  replacement: source/
- pattern: ^ts/srs/
  replacement: source/
links:
- hash: null
  name: component
  role: input
  uid: ../component
patterns:
- exclude: []
  include:
  - common/**/*
  - ts/icd/*.rst
  - ts/srs/overview.rst
  - ts/srs/validation-requirements.rst
  - ts/srs/traceability.rst
pkg-type: workspace
directory: ${.:/component/workspace-directory}/${.:/component/rtems-docs-ecss-directory}
type: pkg
workspace-type: directory
