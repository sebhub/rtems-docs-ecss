attribute-actions: []
attributes:
  content: |
    This section gives an overview of the application configuration dependent
    memory requirements of RTEMS provided objects.

    Barrier Manager
    ^^^^^^^^^^^^^^^

    If the Barrier Manager is used by the application, then
    $${.:/object-size:/rtems/barrier/info}
    bytes are required to maintain the objects of this manager.  The size of an
    object of this manager is independent of the application configuration.  Each
    object of this manager has a size of
    $${.:/object-size:/rtems/barrier/obj}
    bytes.

    Message Manager
    ^^^^^^^^^^^^^^^

    If the Message Manager is used by the application, then
    $${.:/object-size:/rtems/message/info}
    bytes are required to maintain the objects of this manager.  The size of an
    object of this manager is independent of the application configuration.  Each
    object of this manager has a size of
    $${.:/object-size:/rtems/message/obj}
    bytes.  The memory area used for the messages managed by a message queue object
    is user-provided.

    Partition Manager
    ^^^^^^^^^^^^^^^^^

    If the Partition Manager is used by the application, then
    $${.:/object-size:/rtems/part/info}
    bytes are required to maintain the objects of this manager.  The size of an
    object of this manager is independent of the application configuration.  Each
    object of this manager has a size of
    $${.:/object-size:/rtems/part/obj}
    bytes.  The memory area managed by a partition object is user-provided.

    Rate Monotonic Manager
    ^^^^^^^^^^^^^^^^^^^^^^

    If the Rate Monotonic Manager is used by the application, then
    $${.:/object-size:/rtems/ratemon/info}
    bytes are required to maintain the objects of this manager.  The size of an
    object of this manager is independent of the application configuration.  Each
    object of this manager has a size of
    $${.:/object-size:/rtems/ratemon/obj}
    bytes.

    Schedulers
    ^^^^^^^^^^

    The memory used for global scheduler data structures depends on the
    application configuration.  Each scheduler has different memory requirements.

    Each configured scheduler needs $${.:/object-size:/scheduler/control} bytes
    of read-only data.

    The Deterministic Priority Scheduler needs
    $${.:/object-size:/scheduler/priority/context} bytes.  In
    addition, it needs $${.:/object-size:/score/chain/control} bytes
    for each configured priority level.

    $${.:/push-enabled-by:RTEMS_SMP}
    The Earliest Deadline First SMP Scheduler needs
    $${.:/object-size:/scheduler/smp/edf/context} bytes.  In addition, it needs
    $${.:/object-size:/scheduler/smp/edf/ready-queue} bytes for each configured
    processor.
    $${.:/pop-enabled-by}

    Semaphore Manager
    ^^^^^^^^^^^^^^^^^

    $${.:/push-enabled-by:not: RTEMS_SMP}
    If the Semaphore Manager is used by the application, then
    $${.:/object-size:/rtems/sem/info}
    bytes are required to maintain the objects of this manager.  The size of an
    object of this manager is independent of the application configuration.  Each
    object of this manager has a size of
    $${.:/object-size:/rtems/sem/obj}
    bytes.
    $${.:/pop-enabled-by}

    $${.:/push-enabled-by:RTEMS_SMP}
    If the Semaphore Manager is used by the application, then
    $${.:/object-size:/rtems/sem/info}
    bytes are required to maintain the objects of this manager.  The size of an
    object of this manager depends on the application configuration.  Let *S* be
    the count of configured schedulers.  Each object of this manager has a size
    of
    :math:`\max\{$${.:/object-size:/rtems/sem/obj}, $${.:/object-size:/rtems/sem/obj-mrsp} + $${.:/object-size:/rtems/priority/control} S \}`
    bytes.
    $${.:/pop-enabled-by}

    Task Manager
    ^^^^^^^^^^^^

    $${.:/push-enabled-by:not: RTEMS_SMP}
    There are
    $${.:/object-size:/rtems/task/info}
    bytes required to maintain the objects of this manager.  The size of an
    object of this manager depends on the application configuration.  Each object
    of this manager has at least a size of
    $${.:/object-size:/rtems/task/obj}
    bytes.

    If at least one user extension is configured, then additional
    $${.:/object-size:/c/void-pointer} bytes are required for each
    configured user extension plus one.

    Due to alignment requirements of the individual components additional memory is
    required for structure internal padding.  The memory area used for the task
    storage used by a task object is user-provided.
    $${.:/pop-enabled-by}

    $${.:/push-enabled-by:RTEMS_SMP}
    There are
    $${.:/object-size:/rtems/task/info}
    bytes required to maintain the objects of this manager.  The size of an
    object of this manager depends on the application configuration.  Each object
    of this manager has at least a size of
    $${.:/object-size:/rtems/task/obj}
    bytes.

    Additional $${.:/object-size:/score/tq/priority-queue}
    bytes are required for each configured scheduler.

    If at least one user extension is configured, then additional
    $${.:/object-size:/c/void-pointer} bytes are required for each
    configured user extension plus one.

    Let *N* be the maximum of

    * $${.:/object-size:/scheduler/priority/node}, if the
      Deterministic Priority Scheduler is configured, and

    * $${.:/object-size:/scheduler/smp/edf/node}, if the
      Earliest Deadline First SMP Scheduler is configured.

    Additional *N* bytes are required for each configured scheduler.

    Due to alignment requirements of the individual components additional memory
    is required for structure internal padding.  The memory area used for the
    task storage used by a task object is user-provided.
    $${.:/pop-enabled-by}

    Timer Manager
    ^^^^^^^^^^^^^

    If the Timer Manager is used by the application, then
    $${.:/object-size:/rtems/timer/info}
    bytes are required to maintain the objects of this manager.  The size of an
    object of this manager is independent of the application configuration.  Each
    object of this manager has a size of
    $${.:/object-size:/rtems/timer/obj}
    bytes.

    User Extensions Manager
    ^^^^^^^^^^^^^^^^^^^^^^^

    If the User Extensions Manager is used by the application, then
    $${.:/object-size:/rtems/userext/info}
    bytes are required to maintain the objects of this manager.  The size of an
    object of this manager is independent of the application configuration.  Each
    object of this manager has a size of
    $${.:/object-size:/rtems/userext/obj}
    bytes.
