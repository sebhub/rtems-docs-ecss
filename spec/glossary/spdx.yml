term: SPDX
text: |
  This term is an acronym for System Package Data Exchange.  The System Package
  Data Exchange is an open standard for software bills of materials (SBOM).
  Its original intention was to improve licence compliance.  It has been
  extended to also represent other metadata relating to software.
