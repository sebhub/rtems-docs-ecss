term: UART
text: |
  This term is an acronym for Universal Asynchronous Receiver-Transmitter.  A
  Universal Asynchronous Receiver-Transmitter is a peripheral device for
  asynchronous serial communication (for example the hardware of a serial
  port).
type: glossary
