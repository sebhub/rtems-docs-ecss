term: VdS
text: |
  VdS Schadenverhütung GmbH is a German institute dedicated to safety
  in companies (like fire, cyber crime, data protection, natural
  disasters). It is 100% owned by the *Gesamtverbands der Deutschen
  Versicherungswirtschaft (GDV)* (German Insurance Federation).
