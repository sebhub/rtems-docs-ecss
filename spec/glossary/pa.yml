term: PA
text: |
  This term is an acronym for Product Assurance.  _Product assurance_ is a
  discipline devoted to the study, planning, and implementation of activities
  intended to assure that the design, controls, methods, and techniques in a
  project result in a satisfactory degree of quality in a product, see
  ${/ref/ecss/s-st-00-01c:/cite}
